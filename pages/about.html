        <style>
            .page-container {
                max-width: 750px;
                margin: 0 auto;
                padding: 4rem 2rem;
            }

            .page-title {
                font-family: 'DM Serif Display', serif;
                font-size: 2.2rem;

            }

            .page-subtitle {
                color: #666;

            }

            .about-section {
                background: #fff;
                border: 1px solid #e5e7eb;
                border-radius: 0.75rem;
                padding: 1.75rem;
                margin-bottom: 1.5rem;
                border-left: 4px solid #133e5e;
            }

            .about-section h2 {
                font-size: 1.1rem;
                font-weight: 500;
                color: #133e5e;
                margin-bottom: 0.75rem;
            }

            .about-section p {
                color: #555;
                font-size: 0.9rem;
                line-height: 1.7;
            }

            .team-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
                gap: 1rem;
                margin-top: 1rem;
            }

            .team-card {
                background: #f8fafc;
                border-radius: 0.5rem;
                padding: 1rem;
                text-align: center;
                border: 1px solid #e5e7eb;
            }

            .team-avatar {
                width: 48px;
                height: 48px;
                border-radius: 50%;
                background: #133e5e;
                color: #fff;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1rem;
                font-weight: 500;
                margin: 0 auto 0.75rem;
            }

            .team-name {
                font-size: 0.85rem;
                font-weight: 500;
                color: #133e5e;
            }

            .team-role {
                font-size: 0.75rem;
                color: #888;
                margin-top: 0.25rem;
